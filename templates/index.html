<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resy Reservation Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
  }

  #log-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  #log-btn:hover { background: rgba(255,255,255,0.25); }

  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 14px;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .msg.user {
    align-self: flex-end;
    background: #1a1a2e;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.bot {
    align-self: flex-start;
    background: #fff;
    color: #222;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 4px;
  }

  .msg.watch {
    align-self: flex-start;
    background: #fff8e1;
    color: #6d4c00;
    border: 1px solid #ffe082;
    border-bottom-left-radius: 4px;
    font-size: 13px;
    font-family: monospace;
  }

  .msg.typing {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 4px;
    color: #999;
    font-style: italic;
  }

  #input-area {
    padding: 14px 20px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
  }

  #msg-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
  }

  #msg-input:focus { border-color: #1a1a2e; }

  #send-btn {
    background: #1a1a2e;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
  }

  #send-btn:hover { background: #16213e; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Log panel */
  #log-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
  }

  #log-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(420px, 90vw);
    background: #fff;
    z-index: 101;
    display: none;
    flex-direction: column;
    box-shadow: -4px 0 20px rgba(0,0,0,0.15);
  }

  #log-panel.open { display: flex; }
  #log-overlay.open { display: block; }

  #log-header {
    padding: 14px 20px;
    background: #1a1a2e;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #log-header h2 { font-size: 16px; font-weight: 600; }

  #log-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
  }

  /* Tabs */
  .log-tabs {
    display: flex;
    border-bottom: 2px solid #eee;
    background: #fafafa;
  }

  .log-tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .log-tab:hover { color: #444; }

  .log-tab.active {
    color: #1a1a2e;
    border-bottom-color: #1a1a2e;
  }

  .tab-badge {
    display: inline-block;
    background: #e0e0e0;
    color: #555;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 4px;
    min-width: 18px;
    text-align: center;
  }

  .log-tab.active .tab-badge {
    background: #1a1a2e;
    color: #fff;
  }

  #log-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.6;
  }

  .log-section { margin-bottom: 20px; }
  .log-section-title {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  /* Cards */
  .log-card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 3px solid #e8e8e8;
  }

  .log-card .card-venue {
    font-weight: 600;
    color: #1a1a2e;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .log-card .card-details {
    color: #555;
    font-size: 13px;
    margin-bottom: 6px;
  }

  .log-card .card-meta {
    color: #999;
    font-size: 11px;
  }

  /* Watch cards */
  .log-card.watching {
    border-left-color: #4caf50;
    background: #fafff9;
  }

  .log-card.stopped {
    border-left-color: #ccc;
    opacity: 0.6;
  }

  /* Reservation urgency */
  .log-card.upcoming { border-left-color: #1a1a2e; }

  .log-card.past {
    border-left-color: #ccc;
    opacity: 0.6;
  }

  .deadline { font-size: 12px; margin-top: 4px; font-weight: 500; }
  .deadline.green { color: #388e3c; }
  .deadline.amber { color: #f57c00; }
  .deadline.red { color: #d32f2f; }

  /* Cancelled */
  .log-card.cancelled {
    border-left-color: #ef9a9a;
    background: #fff8f8;
  }

  /* Pulse animation for active watches */
  .pulse-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4caf50;
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .stopped-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* Source tag */
  .source-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .source-tag.bot {
    background: #e3f2fd;
    color: #1565c0;
  }

  .source-tag.resy {
    background: #fce4ec;
    color: #c62828;
  }

  /* Expired watches */
  .log-card.expired {
    border-left-color: #ef9a9a;
    opacity: 0.6;
  }

  .expired-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef9a9a;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Booked watches (auto-book success) */
  .log-card.watch-booked {
    border-left-color: #4caf50;
    background: #f1f8e9;
  }

  .booked-check {
    display: inline-block;
    color: #4caf50;
    font-size: 14px;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Watch badges */
  .watch-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .watch-badge.auto-book {
    background: #e8f5e9;
    color: #2e7d32;
  }

  .watch-badge.snipe {
    background: #fff3e0;
    color: #e65100;
  }

  .empty-state {
    text-align: center;
    color: #aaa;
    padding: 40px 20px;
    font-size: 13px;
  }

  .msg.calendar {
    align-self: flex-start;
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
    border-bottom-left-radius: 4px;
  }

  .msg.calendar a {
    color: #1b5e20;
    text-decoration: underline;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <h1>Resy Reservation Bot</h1>
  <button id="log-btn" onclick="toggleLog()">View Log</button>
</header>

<div id="chat-area">
  <div class="msg bot">Hi! I can help you find and book restaurant reservations on Resy. Try something like "Find a table at Commerce Inn for 2 on March 8".</div>
</div>

<div id="input-area">
  <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" />
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<div id="log-overlay" onclick="toggleLog()"></div>
<div id="log-panel">
  <div id="log-header">
    <h2>Dashboard</h2>
    <button id="log-close" onclick="toggleLog()">&times;</button>
  </div>
  <div class="log-tabs">
    <button class="log-tab" data-tab="watches" onclick="switchTab('watches')">Watches <span class="tab-badge" id="badge-watches">0</span></button>
    <button class="log-tab active" data-tab="reservations" onclick="switchTab('reservations')">Reservations <span class="tab-badge" id="badge-reservations">0</span></button>
    <button class="log-tab" data-tab="cancelled" onclick="switchTab('cancelled')">Cancelled <span class="tab-badge" id="badge-cancelled">0</span></button>
  </div>
  <div id="log-content"></div>
</div>

<script>
  const chatArea = document.getElementById('chat-area');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  let ws;
  let typingEl = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      removeTyping();

      if (data.type === 'bot_message') {
        addMessage(data.text, 'bot');
      } else if (data.type === 'watch_update') {
        addMessage(data.text, 'watch');
        // Auto-book success may include calendar links
        if (data.calendar_links) {
          for (const cl of data.calendar_links) {
            const url = cl.url || `/cal/${cl.cal_id}`;
            addCalendarLink(url, cl.label || 'reservation');
          }
        }
      } else if (data.type === 'calendar_link') {
        addCalendarLink(data.url, data.label || 'reservation');
      } else if (data.type === 'typing') {
        showTyping();
      }

      sendBtn.disabled = false;
    };

    ws.onclose = () => {
      setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  function addMessage(text, cls) {
    const div = document.createElement('div');
    div.className = `msg ${cls}`;
    div.textContent = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addCalendarLink(url, label) {
    const div = document.createElement('div');
    div.className = 'msg calendar';
    const text = label === 'cancellation'
      ? 'Add cancellation deadline reminder to calendar'
      : 'Add reservation to calendar';
    div.innerHTML = '📅 <a href="' + url + '">' + text + '</a>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    if (typingEl) return;
    typingEl = document.createElement('div');
    typingEl.className = 'msg typing';
    typingEl.textContent = 'Thinking...';
    chatArea.appendChild(typingEl);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    if (typingEl) {
      typingEl.remove();
      typingEl = null;
    }
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    addMessage(text, 'user');
    ws.send(JSON.stringify({ type: 'message', text }));
    msgInput.value = '';
    sendBtn.disabled = true;
  }

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  let _logData = null;
  let _activeTab = 'reservations';

  async function toggleLog() {
    const panel = document.getElementById('log-panel');
    const overlay = document.getElementById('log-overlay');

    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      overlay.classList.remove('open');
      return;
    }

    try {
      const resp = await fetch('/api/log');
      _logData = await resp.json();
      updateBadges();
      renderTab(_activeTab);
    } catch (e) {
      document.getElementById('log-content').innerHTML = '<p class="empty-state">Failed to load data.</p>';
    }

    panel.classList.add('open');
    overlay.classList.add('open');
  }

  function switchTab(tab) {
    _activeTab = tab;
    document.querySelectorAll('.log-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    renderTab(tab);
  }

  function updateBadges() {
    if (!_logData) return;
    const entries = _logData.entries || [];
    const today = _logData.today || new Date().toISOString().slice(0, 10);
    const activeWatches = entries.filter(e => e && e.status === 'watching' && (e.date || '') >= today);
    const stopped = entries.filter(e => e && e.status === 'stopped');
    const expired = entries.filter(e => e && e.status === 'expired');
    const watchBooked = entries.filter(e => e && e.status === 'booked' && e.auto_book);
    const reservations = entries.filter(e => e && e.status === 'booked');
    const cancelled = entries.filter(e => e && e.status === 'cancelled');
    document.getElementById('badge-watches').textContent = activeWatches.length + stopped.length + expired.length + watchBooked.length;
    document.getElementById('badge-reservations').textContent = reservations.length;
    document.getElementById('badge-cancelled').textContent = cancelled.length;
  }

  function sourceLabel(source) {
    if (source === 'bot') return '<span class="source-tag bot">via bot</span>';
    if (source === 'resy') return '<span class="source-tag resy">on Resy</span>';
    return '';
  }

  function deadlineUrgency(deadline, today) {
    if (!deadline) return { cls: 'green', text: 'Free cancellation' };
    const dl = new Date(deadline);
    const now = new Date(today + 'T00:00:00');
    const hoursLeft = (dl - now) / (1000 * 60 * 60);
    const dlStr = dl.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    if (hoursLeft <= 0) return { cls: 'red', text: `Deadline passed (${dlStr})` };
    if (hoursLeft < 24) return { cls: 'red', text: `Cancel by ${dlStr}` };
    if (hoursLeft < 48) return { cls: 'amber', text: `Cancel by ${dlStr}` };
    return { cls: 'green', text: `Cancel by ${dlStr}` };
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function formatTime(t) {
    if (!t) return '';
    // "2026-03-09 21:15:00" → "9:15 PM"
    const m = t.match(/(\d{1,2}):(\d{2})/);
    if (!m) return esc(t);
    let h = parseInt(m[1]), min = m[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h > 12) h -= 12;
    if (h === 0) h = 12;
    return `${h}:${min} ${ampm}`;
  }

  function renderTab(tab) {
    const container = document.getElementById('log-content');
    if (!_logData) { container.innerHTML = ''; return; }

    const entries = _logData.entries || [];
    const today = _logData.today || new Date().toISOString().slice(0, 10);

    if (tab === 'watches') {
      const active = entries.filter(e => e && e.status === 'watching' && (e.date || '') >= today);
      const watchBooked = entries.filter(e => e && e.status === 'booked' && e.auto_book);
      const stopped = entries.filter(e => e && e.status === 'stopped');
      const expired = entries.filter(e => e && e.status === 'expired');
      if (!active.length && !watchBooked.length && !stopped.length && !expired.length) {
        container.innerHTML = '<p class="empty-state">No watches yet.</p>';
        return;
      }

      function watchBadges(e) {
        let badges = '';
        if (e.auto_book) badges += '<span class="watch-badge auto-book">auto-book</span>';
        if (e.snipe_at) badges += '<span class="watch-badge snipe">snipe</span>';
        return badges;
      }

      function watchDates(e) {
        const dates = e.dates || [e.date];
        return dates.join(', ');
      }

      let html = '';
      if (active.length) {
        html += '<div class="log-section"><div class="log-section-title">Active</div>';
        for (const e of active) {
          const times = (e.preferred_times || []).join(', ');
          let snipeMeta = '';
          if (e.snipe_at) {
            const snipeTime = new Date(e.snipe_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
            snipeMeta = `<br>Snipe at: ${esc(snipeTime)}`;
          }
          html += `<div class="log-card watching">
            <div class="card-venue"><span class="pulse-dot"></span>${esc(e.venue)}${watchBadges(e)}</div>
            <div class="card-details">${esc(watchDates(e))} &middot; Party of ${e.party_size}<br>Looking for: ${esc(times)}${snipeMeta}</div>
            <div class="card-meta">Started ${esc((e.created_at || '').slice(0, 16).replace('T', ' '))}</div>
          </div>`;
        }
        html += '</div>';
      }
      if (watchBooked.length) {
        html += '<div class="log-section"><div class="log-section-title">Booked</div>';
        for (const e of watchBooked) {
          const times = (e.preferred_times || []).join(', ');
          const bookedTime = e.booked_time ? formatTime(e.booked_time) : '';
          const bookedDate = e.booked_date || e.date || '';
          html += `<div class="log-card watch-booked">
            <div class="card-venue"><span class="booked-check">&#10003;</span>${esc(e.venue)}${watchBadges(e)}</div>
            <div class="card-details">Booked: ${esc(bookedDate)} at ${bookedTime} &middot; Party of ${e.party_size}<br>Was looking for: ${esc(times)}</div>
            <div class="card-meta">Snagged ${esc((e.booked_at || '').slice(0, 16).replace('T', ' '))}</div>
          </div>`;
        }
        html += '</div>';
      }
      if (stopped.length) {
        html += '<div class="log-section"><div class="log-section-title">Stopped</div>';
        for (const e of stopped) {
          const times = (e.preferred_times || []).join(', ');
          html += `<div class="log-card stopped">
            <div class="card-venue"><span class="stopped-dot"></span>${esc(e.venue)}${watchBadges(e)}</div>
            <div class="card-details">${esc(watchDates(e))} &middot; Party of ${e.party_size}<br>Was looking for: ${esc(times)}</div>
            <div class="card-meta">Stopped ${esc((e.stopped_at || '').slice(0, 16).replace('T', ' '))}</div>
          </div>`;
        }
        html += '</div>';
      }
      if (expired.length) {
        html += '<div class="log-section"><div class="log-section-title">Past</div>';
        for (const e of expired) {
          const times = (e.preferred_times || []).join(', ');
          html += `<div class="log-card expired">
            <div class="card-venue"><span class="expired-dot"></span>${esc(e.venue)}${watchBadges(e)}</div>
            <div class="card-details">${esc(watchDates(e))} &middot; Party of ${e.party_size}<br>Was looking for: ${esc(times)}</div>
            <div class="card-meta">No match found &middot; Date passed</div>
          </div>`;
        }
        html += '</div>';
      }
      container.innerHTML = html;

    } else if (tab === 'reservations') {
      const booked = entries.filter(e => e && e.status === 'booked');
      if (!booked.length) {
        container.innerHTML = '<p class="empty-state">No reservations yet.</p>';
        return;
      }
      const upcoming = booked.filter(e => (e.date || '') >= today).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      const past = booked.filter(e => (e.date || '') < today).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      let html = '';
      if (upcoming.length) {
        html += '<div class="log-section"><div class="log-section-title">Upcoming</div>';
        for (const e of upcoming) {
          const urg = deadlineUrgency(e.cancellation_deadline, today);
          html += `<div class="log-card upcoming">
            <div class="card-venue">${esc(e.venue)}${sourceLabel(e.source)}</div>
            <div class="card-details">${esc(e.date)} at ${formatTime(e.time)} &middot; Party of ${e.party_size}</div>
            <div class="deadline ${urg.cls}">${urg.text}</div>
          </div>`;
        }
        html += '</div>';
      }
      if (past.length) {
        html += '<div class="log-section"><div class="log-section-title">Past</div>';
        for (const e of past) {
          html += `<div class="log-card past">
            <div class="card-venue">${esc(e.venue)}${sourceLabel(e.source)}</div>
            <div class="card-details">${esc(e.date)} at ${formatTime(e.time)} &middot; Party of ${e.party_size}</div>
          </div>`;
        }
        html += '</div>';
      }
      container.innerHTML = html;

    } else if (tab === 'cancelled') {
      const cancelled = entries.filter(e => e && e.status === 'cancelled');
      if (!cancelled.length) {
        container.innerHTML = '<p class="empty-state">No cancelled reservations.</p>';
        return;
      }
      const sorted = [...cancelled].sort((a, b) => (b.cancelled_at || '').localeCompare(a.cancelled_at || ''));
      let html = '<div class="log-section">';
      for (const e of sorted) {
        const cancelDate = (e.cancelled_at || '').slice(0, 10);
        html += `<div class="log-card cancelled">
          <div class="card-venue">${esc(e.venue)}${sourceLabel(e.source)}</div>
          <div class="card-details">${esc(e.date)} at ${formatTime(e.time)} &middot; Party of ${e.party_size}</div>
          <div class="card-meta">Cancelled ${esc(cancelDate)}</div>
        </div>`;
      }
      html += '</div>';
      container.innerHTML = html;
    }
  }

  connect();
</script>
</body>
</html>
